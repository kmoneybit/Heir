<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login - Thaniablaq</title>
    <link rel="stylesheet" href="/style.css" />
    <style>
      main {
        padding: 120px 20px;
        background: linear-gradient(135deg, #fafafa 0%, #f0f0f0 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-box {
        max-width: 450px;
        width: 100%;
        background: white;
        padding: 50px 40px;
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      }
      .login-title {
        font-size: 2rem;
        color: #1a1a1a;
        margin-bottom: 8px;
        font-weight: 700;
        text-align: center;
      }
      .login-subtitle {
        color: #666;
        text-align: center;
        font-size: 0.95rem;
        margin-bottom: 32px;
        line-height: 1.5;
      }
      .login-form-group {
        margin-bottom: 16px;
      }
      input {
        display: block;
        width: 100%;
        padding: 13px 16px;
        margin: 0;
        border-radius: 10px;
        border: 2px solid #e0e0e0;
        font-size: 1rem;
        color: #1a1a1a;
        transition: all 0.3s ease;
        background: #fafafa;
      }
      input:focus {
        outline: none;
        background: white;
        border-color: #ff8c00;
        box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.1);
      }
      input::placeholder {
        color: #999;
      }
      button {
        background: linear-gradient(135deg, #ff8c00 0%, #ff7700 100%);
        padding: 13px 28px;
        border: none;
        border-radius: 10px;
        font-weight: bold;
        font-weight: 700;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: white;
        width: 100%;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(255, 140, 0, 0.3);
        margin-top: 8px;
      }
      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(255, 140, 0, 0.4);
        background: linear-gradient(135deg, #ff7700 0%, #ff6600 100%);
      }
      #msg {
        margin-top: 16px;
        text-align: center;
        font-weight: 600;
        font-size: 0.95rem;
      }
      .signup-link {
        text-align: center;
        margin-top: 24px;
        color: #666;
        font-size: 0.95rem;
      }
      .signup-link a {
        color: #ff8c00;
        text-decoration: none;
        font-weight: 600;
      }
      .signup-link a:hover {
        color: #ff7700;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logoArea">
        <img src="./image/logo_image.jpg" alt="Logo" class="logoImg" />
        <p class="subTitle">Thaniablaq</p>
      </div>
      <nav class="navLinks">
        <a href="/">Home</a>
        <a href="/#sign-up">Sign Up</a>
      </nav>
      <div class="ham_div">
        <img src="./image/ham_icon.png" alt="Menu" class="ham_icon" />
      </div>
    </header>
    <main>
      <div class="login-box">
        <h2 class="login-title">Welcome Back</h2>
        <p class="login-subtitle">Sign in to your Thaniablaq Hair account</p>

        <div class="login-form-group">
          <input id="email" type="email" placeholder="Email Address" />
        </div>
        <div class="login-form-group">
          <input id="password" type="password" placeholder="Password" />
        </div>

        <button id="login">Sign In</button>
        <p id="msg"></p>

        <p class="signup-link">
          Don't have an account? <a href="/#sign-up">Create one here</a>
        </p>
      </div>
    </main>
    <script src="/app.js"></script>

    <footer class="site-footer">
      <div class="container">
        <div class="col">
          <h4>Thaniablaq</h4>
          <p>Premium-quality hair crafted for confidence and style.</p>
        </div>
        <div class="col">
          <h4>Quick Links</h4>
          <a href="/">Home</a>
          <a href="/#sign-up">Sign Up</a>
        </div>
      </div>
      <div style="text-align: center; color: #777; margin-top: 18px">
        © 2026 Designed by KMONEY
      </div>
    </footer>
  </body>
</html>
